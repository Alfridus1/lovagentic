# .github/workflows/lovable-lighthouse.yml
#
# Gates merges on Lighthouse scores for your Lovable preview.
# Fails the check if Performance < 80 or Accessibility < 90 on either
# desktop or mobile.

name: Lovable Lighthouse

on:
  pull_request:
    paths:
      - "prompts/**"
      - ".github/workflows/lovable-lighthouse.yml"
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install lovagentic
        run: npm install -g lovagentic

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore Lovable session
        env:
          LOVABLE_SESSION_ARCHIVE: ${{ secrets.LOVABLE_SESSION_ARCHIVE }}
        run: |
          mkdir -p ~/.lovagentic/profile
          printf '%s' "$LOVABLE_SESSION_ARCHIVE" | base64 -d | tar xz -C ~/.lovagentic/profile

      - name: Run Lighthouse
        env:
          LOVABLE_PROJECT_URL: ${{ vars.LOVABLE_PROJECT_URL }}
          LOVABLE_PROJECT_ID: ${{ vars.LOVABLE_PROJECT_ID }}
        run: |
          PROJECT_URL="${LOVABLE_PROJECT_URL:-}"
          if [ -z "$PROJECT_URL" ]; then
            PROJECT_URL="https://lovable.dev/projects/${LOVABLE_PROJECT_ID:?Set LOVABLE_PROJECT_URL or LOVABLE_PROJECT_ID}"
          fi

          mkdir -p ./lighthouse-reports
          lovagentic speed \
            "$PROJECT_URL" \
            --device both \
            --output-dir ./lighthouse-reports \
            --json > ./lighthouse-reports/summary.json

          jq -e '
            all(.audits[];
              ((.scores.performance // 0) >= 80) and
              ((.scores.accessibility // 0) >= 90) and
              ((.scores.bestPractices // 0) >= 85)
            )
          ' ./lighthouse-reports/summary.json > /dev/null

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ github.event.pull_request.number }}
          path: ./lighthouse-reports/**
